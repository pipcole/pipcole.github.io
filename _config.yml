  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:p.s.cole@qmul.ac.uk"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/pipcole"
    - label: "ORCID"
      icon: "fab fa-fw fa-orcid"
      url: "https://orcid.org/0000-0001-6045-6358"
      
# ===== Navigation menu =====
